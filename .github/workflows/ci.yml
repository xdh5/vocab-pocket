name: CI and production deploy

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: npm ci
      - run: python -m venv .venv
      - run: .\.venv\Scripts\python.exe -m pip install -r apps\api\requirements-dev.txt
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build:web
      - run: .\.venv\Scripts\python.exe -m compileall -q apps\api
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error
          retention-days: 3

  validate-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: |
          cp deploy/.env.example deploy/.env
          docker compose -f deploy/compose.prod.yml config --quiet
      - name: Build API image
        run: docker build --file deploy/Dockerfile.api .
      - name: Validate Caddy configuration
        run: >-
          docker run --rm
          --volume "$PWD/deploy/Caddyfile:/etc/caddy/Caddyfile:ro"
          caddy:2-alpine
          caddy validate --config /etc/caddy/Caddyfile

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    needs:
      - check
      - validate-deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.ALIYUN_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -T 10 -H "$DEPLOY_HOST" > ~/.ssh/known_hosts

      - name: Upload release
        env:
          DEPLOY_HOST: ${{ secrets.ALIYUN_HOST }}
          DEPLOY_USER: ${{ secrets.ALIYUN_USER }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" 'mkdir -p ~/vocaboom'
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.venv/' \
            --exclude 'node_modules/' \
            --exclude 'data/' \
            --exclude 'apps/api/.env' \
            --exclude 'deploy/.env' \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:~/vocaboom/"

      - name: Write production secrets
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          DEPLOY_HOST: ${{ secrets.ALIYUN_HOST }}
          DEPLOY_USER: ${{ secrets.ALIYUN_USER }}
        run: |
          printf 'VOCABULARY_ARK_API_KEY=%s\n' "$ARK_API_KEY" | \
            ssh "$DEPLOY_USER@$DEPLOY_HOST" 'umask 077; cat > ~/vocaboom/deploy/.env'

      - name: Start production services
        env:
          DEPLOY_HOST: ${{ secrets.ALIYUN_HOST }}
          DEPLOY_USER: ${{ secrets.ALIYUN_USER }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            'cd ~/vocaboom && docker compose -f deploy/compose.prod.yml up -d --build --remove-orphans && docker image prune -f'

      - name: Verify production
        run: curl --fail --show-error --silent --retry 12 --retry-delay 5 https://vocaboom.cyberlab.bond/health
