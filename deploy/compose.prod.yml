name: vocaboom

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    env_file:
      - .env
    environment:
      VOCABULARY_DATA_DIR: /data
    ports:
      - "172.17.0.1:18000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    volumes:
      - vocaboom_data:/data

volumes:
  vocaboom_data:
